name: Update NBA Data Daily

on:
  schedule:
    - cron: "15 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests nba_api python-dotenv

      - name: Fetch latest NBA player game logs
        run: |
          python src/courtiq/data/fetch_player_gamelog_nba_api.py
        env:
          COURTIQ_SEASON: "2025-26"
          COURTIQ_SEASON_TYPE: "Regular Season"
          COURTIQ_LIMIT_PLAYERS: "0"
          COURTIQ_SLEEP_SECONDS: "0.6"

      - name: Commit updated CSV files to dev
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -f data/raw/*.csv
          git commit -m "Daily NBA data update" || echo "No data changes"
          git push origin dev